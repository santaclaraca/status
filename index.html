<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="refresh" content="120">
	<meta name="robots" content="noindex">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
	<title>Status Dashboard</title>

	<!-- INCLUDING JQUERY-->
	<script src="https://code.jquery.com/jquery-3.5.1.js">
	</script>

	<!-- CSS FOR STYLING THE PAGE -->
	<style>
		section#stadash {
    		font-family: 'Gill Sans', 'Gill Sans MT', ' Calibri', 'Trebuchet MS', 'sans-serif';
			width: fit-content;
    		margin: auto;
		}
		.material-icons {font-size: 17px;}

		.box {
            display: flex;
			justify-content: space-around;
			align-items: flex-start;
          	}
		a.listit {text-decoration: none;
			font-size: medium;
			}
		table {
			margin: 10px;
			font-size: large;
			border: 1px #ccc solid;
			border-spacing:0;
			background-color: #FFF;
		}
		.light {text-align: center;}
		.light span {display:none}
		.light div { 	
			width: 15px; 
			height: 15px;
			border: 1px solid #ccc; 
			margin: auto;
		}
		.up {background-color:greenyellow}
		.down {background-color:red}
		
		#stadash h1 {
			text-align: center;
			color: #d85836;
			font-size: xx-large;
			padding: 25px;
			margin:10px;
			background: #14213f url("https://icons.duckduckgo.com/ip3/santaclaraca.gov.ico") no-repeat left;
  			background-size: 100px;
			background-origin: content-box;
		}
		#stadash h1 span {font-size: medium; 
			color: #FFF;
		}
		td {
			border: none;
		}
		tr:nth-child(even) {
			background-color: #e4e1dc;
		}
		th,
		td {
			padding: 5px 10px;
			text-align: center;
			border-bottom: 1px #e4e1dc solid
		}
		td:nth-child(1) {
            text-align: left;
		}
		td > img {
			margin-right: 5px; 
			height: 14px; 
			width: 14py; 
		}
		#stadash tr:first-child {
			color: #152140;
			font-weight: bolder;
			text-shadow: 1px 1px #FFF, -1px -1px #FFF;
			background-color: #e4e1dc;
			opacity: 1;
			background-size: 12px 12px;
			background-image: repeating-linear-gradient(45deg, #ffffff 0, #ffffff 1.2000000000000002px, #e4e1dc 0, #e4e1dc 50%);
		}
	</style>
</head>

<body>
	<section id="stadash">
		<h1>upptime
		<br/><span>City of Santa Clara</span></h1>
		<div class="box">
		<!-- TABLE CONSTRUCTION-->
		<table id='table'>
			<!-- HEADING FORMATION -->
			<tr>
				<th>Website</th>
				<th>Status</th>
			</tr>
			<script>
				$(document).ready(function () {
                    // FETCHING DATA FROM JSON FILE
                    var rawbase = 'https://raw.githubusercontent.com/';
                    var jsonloc = 'santaclaraca/upptime/master/history/summary.json';

                    $.getJSON(rawbase + jsonloc, function (data) {
                                
						        var upstatus = '';

						// ITERATING THROUGH OBJECTS
						$.each(data, function (key, value) {

							//CONSTRUCTION OF ROWS HAVING
							// DATA FROM JSON OBJECT
							upstatus += '<tr>';
							value.url = value.url.replace("$TITAN", "https://cityofsantaclara.mytitan.net/app/alarms.aspx");
                            value.url = value.url.replace("$SITE_MAIN_ADMIN", "https://www.santaclaraca.gov/Admin/");
                            value.url = value.url.replace("$SITE_MAIN_EMAIL", "https://admin.govdelivery.com/");
                            value.url = value.url.replace("$SITE_SEO_C", "https://my.cludo.com/");
                            value.url = value.url.replace("$SITE_SAFETY", "https://mark43.com/");
                            value.url = value.url.replace("$SITE_SAAS_PERF", "https://id.siteimprove.com/Account/Login");
                            value.url = value.url.replace("$SITE_PEOPLESOFT", "https://ESS.SantaClaraCA.gov");
                            value.url = value.url.replace("$CUSTOMER_CONNECT", "https://mua.santaclaraca.gov/CC/Login.xml");
							var foricon = '';
							foricon = value.url.replace(/^http(s?):\/\//i, "");
							foricon = foricon.replace(/\/$/, "");
							if (value.url.startsWith("$")) {upstatus += '<td><img src=\"https://icons.duckduckgo.com/ip3/' + foricon + '.ico\" alt=\"\"/> ' + value.name + '</td>';
							}
							else {
                            upstatus += '<td><img src=\"https://icons.duckduckgo.com/ip3/' + foricon + '.ico\" alt=\"\"/> <a class=\"listit\" href=\"' + 
								value.url + '\" target=\"_blank\">' + value.name + '</td>';}
							upstatus += '<td class=\"light\"><div class=\"' + value.status + '\"></div><span>' +
								value.status + '</span></td>';
							upstatus += '</tr>';
						})
						
						//INSERTING ROWS INTO TABLE
						$('#table').append(upstatus);
                            });
				});
			</script>
			
			<table id="table1">
				<!-- HEADING FORMATION -->
				<tr>
					<th>Manual check</th>
					<th>Link</th>
				</tr>
				<script>
					$(document).ready(function () {
						// FETCHING DATA FROM JSON FILE
						var rawbase = 'https://raw.githubusercontent.com/';
						var jsonloc = 'santaclaraca/status/gh-pages/content/isites.json';
	
						$.getJSON(rawbase + jsonloc, function (data1) {
									
									var chkstatus = '';
	
							// ITERATING THROUGH OBJECTS
							$.each(data1, function (key, value) {
	
								//CONSTRUCTION OF ROWS HAVING
								// DATA FROM JSON OBJECT
								var foricon = '';
								foricon = value.url.replace(/^http(s?):\/\//i, "");
								foricon = foricon.replace(/\/$/, "");
								chkstatus += '<tr>';
								chkstatus += '<td><img src=\"https://icons.duckduckgo.com/ip3/' + foricon + '\.ico" alt=\"\"/> <a class=\"listit\" href=\"' + value.url + '\" target=\"_blank\">' + value.name + '</a></td>';
								chkstatus += '<td><a class=\"listit\" href=\"' + value.url + '\" target=\"_blank\"><i class="material-icons">shield</i></a></td>';
								chkstatus += '</tr>';
							})
							
							//INSERTING ROWS INTO TABLE
							$('#table1').append(chkstatus);
								});
 					});
				</script>
				</table>
				
		
		</div>
	</section>
</body>
