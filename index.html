<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="refresh" content="120">
	<meta name="robots" content="noindex">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
	<title>Status Dashboard</title>

	<!-- INCLUDING JQUERY-->
	<script src="https://code.jquery.com/jquery-3.5.1.js">
	</script>

	<!-- CSS FOR STYLING THE PAGE -->
	<style>
        body {font-family: 'Gill Sans',
				'Gill Sans MT', ' Calibri',
				'Trebuchet MS', 'sans-serif';
			width: fit-content;
			margin: auto;
			}
		.material-icons {font-size: 17px;}

		.box {
            display: flex;
			justify-content: space-around;
			align-items: flex-start;
          	}
		a {text-decoration: none;}
		table {
			margin: 10px;
			font-size: large;
			border: 1px #ccc solid;
			border-spacing:0;
			background-color: #FFF;
		}
		.light {text-align: center;}
		.light span {display:none}
		.light div { 	
			width: 15px; 
			height: 15px;
			border: 1px solid #ccc; 
			margin: auto;
		}
		.up {background-color:greenyellow}
		.down {background-color:red}
		
		h1 {
			text-align: center;
			color: #FFF;
			font-size: xx-large;
			padding: 25px;
			margin:10px;
			text-shadow: -1px 1px 2px #999,
				  1px 1px 2px #999,
				  1px -1px 0 #999,
				  -1px -1px 0 #999;
		}
		td {
			border: none;
		}
		tr:nth-child(even) {
			background-color: #f5f5f7;
		}
		th,
		td {
			padding: 5px 10px;
			text-align: center;
			border-bottom: 1px #ccc solid
		}
		td:nth-child(1) {
            text-align: left;
		}
		h1, th {background-color: #e5e5e6;
opacity: 0.8;
background-size: 12px 12px;
background-image: repeating-linear-gradient(45deg, #ffffff 0, #ffffff 1.2000000000000002px, #e5e5e6 0, #e5e5e6 50%);}
	</style>
</head>

<body>
	<section>
		<h1>Uptime CSC</h1>
		<div class="box">
			
		<!-- TABLE CONSTRUCTION-->
		<table id='table'>
			<!-- HEADING FORMATION -->
			<tr>
				<th>Website</th>
				<th>Status</th>
			</tr>
			<script>
				$(document).ready(function () {
                    // FETCHING DATA FROM JSON FILE
                    var rawbase = 'https://raw.githubusercontent.com/';
                    var jsonloc = 'santaclaraca/upptime/master/history/summary.json';

                    $.getJSON(rawbase + jsonloc, function (data) {
                                
						        var upstatus = '';

						// ITERATING THROUGH OBJECTS
						$.each(data, function (key, value) {

							//CONSTRUCTION OF ROWS HAVING
							// DATA FROM JSON OBJECT
							upstatus += '<tr>';
							value.url = value.url.replace("$TITAN", "https://cityofsantaclara.mytitan.net/app/alarms.aspx");
                            value.url = value.url.replace("$SITE_MAIN_ADMIN", "https://www.santaclaraca.gov/Admin/");
                            value.url = value.url.replace("$SITE_MAIN_EMAIL", "https://admin.govdelivery.com/");
                            value.url = value.url.replace("$SITE_SEO_C", "https://my.cludo.com/");
                            value.url = value.url.replace("$SITE_SAFETY", "https://mark43.com/");
                            value.url = value.url.replace("$SITE_SAAS_PERF", "https://id.siteimprove.com/Account/Login");
                            value.url = value.url.replace("$SITE_PEOPLESOFT", "https://ESS.SantaClaraCA.gov");
                            value.url = value.url.replace("$CUSTOMER_CONNECT", "https://mua.santaclaraca.gov/CC/Login.xml");
							if (value.url.startsWith("$")) {upstatus += '<td>' + value.name + '</td>';
							}
							else {
                            upstatus += '<td><a href=\"' + 
								value.url + '\" target=\"_blank\">' + value.name + '</td>';}
							upstatus += '<td class=\"light\"><div class=\"' + value.status + '\"></div><span>' +
								value.status + '</span></td>';
							upstatus += '</tr>';
						})
						
						//INSERTING ROWS INTO TABLE
						$('#table').append(upstatus);
                            });
				});
			</script>
			
			<table id="table1">
				<!-- HEADING FORMATION -->
				<tr>
					<th>Manual check</th>
					<th>Link</th>
				</tr>
				<script>
					$(document).ready(function () {
						// FETCHING DATA FROM JSON FILE
						var rawbase = 'https://raw.githubusercontent.com/';
						var jsonloc = 'santaclaraca/status/gh-pages/content/isites.json';
	
						$.getJSON(rawbase + jsonloc, function (data1) {
									
									var chkstatus = '';
	
							// ITERATING THROUGH OBJECTS
							$.each(data1, function (key, value) {
	
								//CONSTRUCTION OF ROWS HAVING
								// DATA FROM JSON OBJECT
								chkstatus += '<tr>';
								chkstatus += '<td><a href=\"' + value.url + '\" target=\"_blank\">' + value.name + '</a></td>';
								chkstatus += '<td><a href=\"' + value.url + '\" target=\"_blank\"><i class="material-icons"">shield</i></a></td>';
								chkstatus += '</tr>';
							})
							
							//INSERTING ROWS INTO TABLE
							$('#table1').append(chkstatus);
								});
					});
				</script>
				</table>
				
		
		</div>
	</section>
</body>
